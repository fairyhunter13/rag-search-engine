# RSE World Model — structured, queryable, partially-executable representation
# of what RSE is, why it is built this way, and how it MUST be built.
# Four-layer schema (agentic-coding, June 2026): L1 invariants → L2 components →
# L3 behavior specs → L4 code patterns.  check_world_model.py evaluates L1/L3
# predicates against working-tree diffs to emit CONFORMS / AT_RISK.
schema_version: "0.1"

# ── L1: Architecture & Invariants (rules of the game) ────────────────────────
# Each entry: id, principle (the law), check (executable predicate for AT_RISK detection).
L1_invariants:
  - id: P0
    principle: "GPU-only inference — embed+rerank on CUDA; CPU fallback raises fatally."
    check: {grep: "cpu_fallback|CPU_ONLY|providers.*cpu", paths: "src/rag_search/", verdict_if_match: AT_RISK}
  - id: P1
    principle: "No local generative LLM. KB=DeepSeek-only. Chat=claude-haiku-4-5 only."
    check: {grep: "ollama|qwen3|llama|local.*model", paths: "src/rag_search/", verdict_if_match: AT_RISK}
  - id: P2
    principle: "MCP query path (search/ask/graph/overview) runs NO generative LLM — only embed+rerank."
    check: {grep: "deepseek_extract|deepseek_chat|claude.*ask|haiku.*ask", paths: "src/rag_search/query/", verdict_if_match: AT_RISK}
  - id: P3
    principle: "Federation = query-time union; no cross-repo edges; members have independent stores."
    check: {grep: "cross.*repo.*edge|member.*edge.*root", paths: "src/rag_search/graph/ src/rag_search/index/ src/rag_search/daemon/", verdict_if_match: AT_RISK}
  - id: P4
    principle: "Indexing is event-driven (watcher/inotify); heavy KB cascade (enrich/wiki/BPRE) runs ONLY on source-fingerprint drift — never on metadata-only or non-indexed-file events; no periodic sweeps or timers."
    check: {grep: "register.*kb_sweep|register.*auto_index|threading.Timer.*sweep", paths: "src/rag_search/daemon/", verdict_if_match: AT_RISK}
  - id: P5
    principle: "Two-stage retrieval: vector recall (sqlite-vec) → cross-encoder rerank (GPU). Results ordered by rerank_score."
    check: {grep: "rerank.*skip", paths: "src/rag_search/query/", verdict_if_match: AT_RISK}
  - id: P6
    principle: "No heuristics — tree-sitter + LLM only. No re, no static/dynamic keyword list, no mapping table may substitute for structural analysis in Category A paths. Regex is grepped here; keyword/mapping-table debt is enforced by name in test_no_code_semantic_regex.py (a dict/frozenset literal ban can't be soundly grepped) — the registry is empty as of 2026-07-01: the last entry, bpre_spec._LANG_SPECS/_DEFAULT_SPEC (15 per-language HTTP method-name tables), was retired in favor of ONE universal structural classifier (URL-path anchor + _has_handler_arg handler-shape + _V verb ground-truth + gRPC proto-binding + _SCHEMES receiver-text provenance for non-verb client idioms) covering every tree-sitter code grammar by construction. Protocol/framework codegen-contract naming bound to structural facts (e.g. protoc New*Client/Register*Server scoped to .pb.go output, Spring *Mapping annotations, _GRP_SFXS gated on a discovered proto_services match) is ground truth, not a heuristic — reclassified 2026-07-01, same class as the closed HTTP-verb set _V and the closed protocol/URI-scheme set _SCHEMES. _provenance (bpre_generic.py) was generalized 2026-07-01 (Part C1) from receiver-text-only to also resolve def-use type bindings (build_type_use, valueflow.py) and import-map aliases (_scan_imports, bpre_ast.py) against the same closed _SCHEMES set — still zero library-name vocabulary; unresolved bare library-name idioms (e.g. requests/axios on a non-scheme absolute URL) remain accounted residue-ladder territory, never silently dropped."
    check: {grep: "re\\.compile|re\\.finditer|re\\.search", paths: "src/rag_search/kb/bpre.py src/rag_search/kb/bpre_ast.py src/rag_search/kb/bpre_spec.py src/rag_search/kb/bpre_generic.py src/rag_search/kb/bpre_paradigms.py src/rag_search/kb/patterns.py src/rag_search/server/_overview.py", verdict_if_match: AT_RISK}
  - id: P7
    principle: "Public-repo hygiene — absolute device paths never in wiki/docgen/OKF artifacts."
    check: {grep: "/home/|/root/|/Users/", paths: "src/rag_search/kb/wiki.py src/rag_search/kb/bpre.py", verdict_if_match: AT_RISK}
  - id: P8
    principle: "No mocks in tests — real daemon at :8765, real GPU, real embedder."
    check: {grep: "unittest\\.mock|MagicMock|@patch\\(", paths: "src/tests/", exclude_paths: "src/tests/live/test_no_mocks_or_fakes.py", verdict_if_match: AT_RISK}
  - id: P9
    principle: "Flat-L1 communities only — no L2/L3 hierarchy in RSE KB (WS-B 2026-06-26)."
    check: {grep: "build_hierarchy|build_federation_hierarchy|set_community_parent", paths: "src/rag_search/", verdict_if_match: AT_RISK}
  - id: P10
    principle: "Every line of code is a liability — prefer no change, then deletion, then smallest diff."
    check: null
  - id: P11
    principle: "Push after every commit — zero unpushed is the policy."
    check: null
  - id: P12
    principle: "Doc-tooling (docgen + OKF) is LLM-native via claude -p; no tree-sitter on the doc-tooling path."
    check: {grep: "import tree_sitter|from tree_sitter", paths: "vendor/docgen/src/ vendor/okf/src/", verdict_if_match: AT_RISK}
  - id: P13
    principle: "Docgen + OKF = manual-trigger only; never called from auto-sweep (_enrich_project) or MCP tools."
    check: {grep: "run_docgen|run_okf", paths: "src/rag_search/daemon/sweeps.py", verdict_if_match: AT_RISK}
  - id: P14
    principle: "LLM lanes: GPU=embed+rerank; DeepSeek=KB-enrichment; claude-haiku-4-5=chat; claude-p=doc-tooling. No cross-lane calls."
    check: null
  - id: P15
    principle: "Kill-switches (RSE_DOCGEN=0, RSE_OKF=0) → no output; no deterministic skeleton fallback."
    check: null
  - id: P16
    principle: "Idle frugality — with no query and no source drift the daemon holds < 1 % CPU and a constant RAM floor; models unload after RSE_MODEL_IDLE_UNLOAD_S (300 s default); GPU is the only inference engine (maximized; CPU fallback fatal). CPU budget is two-tier and kernel-enforced, not merely cooperative (HR40): idle/steady-state < 1 % of one core is a live-measured automated gate; active work (indexing, BPRE, parsing) is bounded ≤ 1 core by a cgroup-v2 CPUQuota on the daemon's systemd unit that it physically cannot exceed."
    check: null
  - id: P17
    principle: "File-watching is event-driven via OS filesystem notifications (watchfiles/Rust notify) — one inotify instance + one thread for all watched roots, Rust-side event coalescing; manual per-file polling is a last-resort fallback only (NFS/SMB, handled internally by the Rust notify crate's force_polling), never a hand-rolled Python poll loop. Watcher-triggered indexing/parsing work inherits the same kernel CPUQuota ceiling as the rest of the daemon (HR40), including bounded_parse.py's spawn-context workers, which are children of the daemon's own cgroup."
    check: {grep: "threading.Timer|while.*st_mtime|while.*poll.*sleep", paths: "src/rag_search/daemon/", verdict_if_match: AT_RISK}
  - id: P18
    principle: "Public-release & device-neutrality (whole-repo facet of P7) — the tracked tree is publishable: no secrets, no real device paths, no company/project names. Every machine-specific value (storage paths, host, port, models, GPU device) is env-driven with XDG defaults (core/config.py); no hardcoded absolute paths/usernames/hostnames in tracked source, tests, docs, or generated artifacts. Permanent brand lock (2026-07-09): the legacy OSE/OPENCODE/ocs branding was fully retired in favor of RSE — no OPENCODE_, OSE_, bare OSE, opencode, ocs[-_]/ose[-_], or opencode-index token may ever reappear, outside a narrow external-product allowlist (the external OpenCode CLI product, the vendored ose-docgen package/repo). Device-specific name bans (company/codename/device-id lists) never ship in the public tree — they live only in the private rse-live-audit repo."
    check: {grep: "/home/[a-zA-Z0-9_.-]+/|/root/[a-zA-Z0-9_.-]+/|/Users/[a-zA-Z0-9_.-]+/|C:\\\\Users\\\\[a-zA-Z0-9_.-]+", paths: "src/rag_search/ docs/ scripts/ vendor/*/src/", exclude_paths: "src/tests/live/test_public_hygiene.py", verdict_if_match: AT_RISK}

# ── L2: Components (capability → module → entry points) ─────────────────────
L2_components:
  core:    {module: "rag_search.core",    ops: [config, registry, types]}
  embed:   {module: "rag_search.embed",   ops: [get_embedder, get_reranker], gpu: true}
  index:   {module: "rag_search.index",   ops: [index_project, VectorStore]}
  graph:   {module: "rag_search.graph",   ops: [extract_symbols, detect_communities, GraphStore]}
  kb:      {module: "rag_search.kb",      ops: [enrich_communities_batch, build_wiki, reconstruct_processes, run_docgen, run_okf]}
  query:   {module: "rag_search.query",   ops: [search, compose_answer]}
  server:  {module: "rag_search.server",  ops: [mcp, routes_pipeline, routes_project, _overview]}
  daemon:  {module: "rag_search.daemon",  ops: [sweeps, watcher, federation, scheduler]}

# ── L3: Behavior specs (HRs — each maps to a §14 test) ──────────────────────
L3_specs:
  - id: HR1
    spec: "Watcher is the steady-state indexing trigger; on_change incremental-embeds."
    test: test_p34_watcher_updates_vector_index
  - id: HR4
    spec: "Federation query-time union; no cross-repo edges; expand_federation fan-out."
    test: test_inv1_no_inlining
  - id: HR6
    spec: "GPU-only embed+rerank; CPU fallback fatal; assert_cuda_available at startup."
    test: test_select_gpu_providers_fatal_on_cpu_only
  - id: HR8
    spec: "Two-stage retrieval; rerank_score is the ranking authority; both AXIS A+B reranked."
    test: test_rerank_passages_only_in_gpu_lane
  - id: HR9
    spec: "MCP query actions run no generative LLM — embed+rerank only."
    test: test_mcp_handlers_have_no_llm_generation
  - id: HR10
    spec: "Dashboard chat uses claude-haiku-4-5 only; no DeepSeek fallback."
    test: test_chat_lane_is_haiku_only
  - id: HR11
    spec: "semantic_type assigned by DeepSeek classify batch-20; reclassify_all=False (no churn)."
    test: test_ab3_no_type_dominates
  - id: HR12
    spec: "KB enrichment uses cloud DeepSeek only; crashes if DEEPSEEK_API_KEY absent."
    test: test_kb_enrich_is_deepseek_only
  - id: HR13
    spec: "Wiki artifacts use project-root-relative paths; no absolute device paths."
    test: test_community_page_structure
  - id: HR15
    spec: "No re.compile/re.finditer, no keyword/mapping-table heuristic in Category A (bpre.py, bpre_ast.py, bpre_spec.py, bpre_generic.py, bpre_paradigms.py, patterns.py, _overview.py services); resolution ladder is tree-sitter/gRPC-pubsub-registry (1.0) -> GPU rerank incl. valueflow-resolved residue (0.8) -> DeepSeek escalate (0.7) — 3 tiers, full stop; no code path stamps any other confidence value. valueflow (kb/valueflow.py) feeds candidates into the 1.0/0.8 tiers and stamps no confidence of its own. Every non-first-class language (all 299 tree-sitter code grammars) shares ONE universal structural classifier in bpre_generic.py/bpre_paradigms.py — no per-language table remains. _provenance (the non-verb HTTP-client discriminator) resolves three signal sources against the closed _SCHEMES set — receiver text, def-use-resolved constructed-type name (build_type_use, valueflow.py), and import-map-resolved module path (_scan_imports, bpre_ast.py, generalizing Go's existing import check to every language) — still zero library-name vocabulary; a bare library-name idiom with no scheme-bearing signal falls through to the DeepSeek escalate tier of this same ladder, never silently dropped."
    test: test_no_code_semantic_regex_in_category_a
  - id: HR23
    spec: "DIKW token economy — llm_token_stats() accounts for every DeepSeek call site in kb/ (enrich/classify/bpre narrative AND bpre edge-resolution); no direct deepseek_extract call may bypass accumulation."
    test: test_bpre_link_resolve_tokens_are_accounted
  - id: HR20
    spec: "Partition quality gate: degenerate=True demotes kb_state to searchable."
    test: test_kb_state_demoted_when_degenerate
  - id: HR25
    spec: "Docgen IH is LLM-native via claude -p; no tree-sitter import on the doc-tooling path."
    test: test_ih_no_tree_sitter_import_in_vendor
  - id: HR26
    spec: "Docgen and OKF are manual-trigger only; not called from _enrich_project or MCP tools."
    test: test_ih_docgen_not_in_sweeps
  - id: HR27
    spec: "Kill-switch RSE_DOCGEN=0 → generate() returns mode=off, writes no files."
    test: test_ih_kill_switch_off
  - id: HR28
    spec: "OKF v0.1 bundle: one concept per semantic-named file; index.md present; type required; no fragment_ naming."
    test: test_okf_llm_generate_structure
  - id: HR29
    spec: "Kill-switch RSE_OKF=0 → generate() returns mode=off, writes no files."
    test: test_okf_kill_switch_off
  - id: HR30
    spec: "MCP surface = index+search+ask+graph+overview only; docgen and okf absent from _MCP_TOOLS."
    test: test_api_docgen_not_in_mcp
  - id: HR32
    spec: "Idle-efficiency — on_change KB cascade (enrich/wiki/BPRE) is gated by source-fingerprint drift (_last_enriched_sig); metadata-only and non-source events skip the cascade entirely; idle-unload frees the ORT arena after MODEL_IDLE_UNLOAD_S; CPU < 1 % when idle."
    test: test_drift_gate_skips_enrich_when_sig_unchanged
  - id: HR33
    spec: "Notification-first watcher — Watcher.start() runs a single watchfiles (Rust notify) thread across all watched roots; no hand-rolled poll loop exists (polling, if ever needed, is the Rust library's own force_polling path)."
    test: test_watcher_prefers_inotify_over_poll
  - id: HR34
    spec: "Public-release & device-neutrality guard (P18) — a whole-tracked-tree git-grep (src/, docs/, scripts/, vendor/*/src/, generated artifacts) fails on any absolute /home/<user>/, /root/, /Users/<user>/, or Windows C:\\Users\\<user>\\ path; storage-path literals in core/ and daemon/ must derive from XDG_DATA_HOME/RSE_* env, never a hardcoded machine path. Permanent brand-lock guard (2026-07-09): a parametrized whole-tracked-tree git-grep bans every legacy OSE/OPENCODE/ocs token form (OPENCODE_, OSE_, bare OSE, opencode, ocs[-_]/ose[-_], opencode-index) from ever reappearing, excluding this guard file, the two generated skill files, vendor/, .gitmodules, and lines containing a genuine external-product reference (Title-case OpenCode, ose_docgen/ose-docgen). Runnable-by-anyone contract (hardened 2026-07-09): every machine/deployment-specific value in core/config.py — embed/rerank model, embed device, daemon host/port, query LLM provider/model, GPU device override — must itself be produced by os.environ.get(...), so a fresh clone needs zero source edits to retarget any of them. .gitmodules' vendor/docgen submodule URL and the CI live-fast job's github.repository guard are confirmed public/fork-safe (submodule repo is publicly cloneable; the CI guard exists specifically so forks without a self-hosted GPU runner skip the job instead of hanging) and are not in scope for genericization. Device-specific name bans (company/codename/device-id) are deliberately absent from the public tree and live only in the private rse-live-audit repo."
    test: test_no_absolute_home_paths
  - id: HR35
    spec: "Source-fingerprint discovery is gitignore- and hidden-dir-aware with RSE-config precedence (index/discover.py _should_drop, shared by iter_files + is_ignored_path): RSE .rse-index.yaml exclude beats include beats default hidden-dir/IGNORED_DIRS policy beats .gitignore beats keep. Gitignored/hidden tool-cache dirs (.svelte-kit, .playwright-mcp, .astro, .turbo, .vite, etc.) never enter _source_fingerprint, so tool-cache regeneration cannot spuriously flip the P4 drift gate (root-caused 2026-07-01: a live vite/playwright session rewriting wiki/.svelte-kit + .playwright-mcp pinned a CPU core via an every-~5min false-positive BPRE/enrich cascade)."
    test: test_drift_gate_quiescent_under_tool_cache_churn
  - id: HR36
    spec: "BPRE's federation-wide reuse stamp (bpre_source_sig, kb/bpre.py) and per-member scan-cache key (_member_scan_sig) are code-only and discovery-unified: _source_files routes through the same HR35 _should_drop resolver as iter_files (is_code_language-gated, hidden-dir/gitignore/RSE-config aware), and _bpre_code_sig hashes only that file set — never the all-files _source_fingerprint. The stamp is written once from the sig computed at rebuild start (no end-of-rebuild recompute), so docs/config/image/hidden-tool-cache churn on a federation root can never trigger a process-graph rebuild, while a real member code edit still does (root-caused 2026-07-01, 3rd distinct idle-CPU cause: docs/*.yaml + .claude/*.js churn on a 170-member federation root was flipping the all-files stamp faster than the ~5min rebuild completed, pinning a core continuously)."
    test: test_bps1_docs_churn_quiescent_no_rebuild
  - id: HR37
    spec: "The watcher trigger surface, not only the drift gates it feeds, must be ignore-aware and storm-proof: daemon/watcher.py runs one watchfiles (Rust notify) thread + one inotify instance for ALL watched roots (not one watchdog Observer per root); watch_filter reuses the HR35 is_ignored_path resolver so a churn burst in a hidden/gitignored dir is dropped in Rust before on_change is ever called; Rust-side debounce/step coalesces a burst of writes to one file into a single on_change call; dynamic watch(new_root) while running relaunches the watch generator and blocks (bounded, via a restart-ack event) until the new root is actually armed, closing the race where an edit immediately after a dynamic add could land in the teardown/rearm gap and be silently lost (root-caused 2026-07-01 evening, 4th distinct idle-CPU cause: watchdog scheduled one recursive Observer per federation member — ~278 threads / 139 inotify instances, already over the default max_user_instances=128 — and filtered ignored paths post-hoc in Python per raw event, so an unbounded Python-side InotifyBuffer grew to 2.45GB RSS and pinned one dispatch thread at ~104% CPU for the life of the process, even after the HR35/HR36 drift-gate fixes made the gates themselves correctly report no drift)."
    test: test_wt1_ignored_dir_churn_never_reaches_on_change
  - id: HR38
    spec: "The on_change KB/wiki/BPRE enrich cascade and the graph re-derive gate (_graph_stale/source_sig, daemon/sweeps.py) key on a code-only fingerprint (_code_source_fingerprint), not the all-files _source_fingerprint: iter_files results are filtered through is_code_language — the same filter BPRE's own HR36 _bpre_code_sig already uses — so docs/wiki/config/image churn on a project root can never wake the cascade or force a graph re-derive, only real source-code drift does. The vector-index/doc-search reindex step (_index_files/_index_project) runs before this gate and is unaffected — doc search freshness is unchanged. Unifies the drift gate with BPRE's HR36 reuse stamp (previously the two used different fingerprints, so BPRE could correctly skip a rebuild while sweeps.py's own gate still spuriously fired enrich/wiki on non-code churn — root-caused 2026-07-01)."
    test: test_fcg1_docs_wiki_churn_quiescent
  - id: HR39
    spec: "Every tree-sitter parse (graph/extractor.py symbol/call extraction; kb/bpre_ast.py scan_file and the proto-surface pass, including the Go fast path) runs through index/bounded_parse.py's persistent spawn-context worker pool, never a direct get_parser(...).parse() call — enforced by a guard test banning that call shape outside bounded_parse.py. A worker that exceeds its deadline is terminated and respawned; the timeout is recorded (path-hash only, public-hygiene — P7/HR34) via parse_timeout_count in overview(what='metrics'), and extraction continues with the next file, so no grammar is ever silently skipped. Workers are spawn-context and CPU-only (never fork, never import the embedder — the daemon holds CUDA + many threads) so GPU-only doctrine (P0) is unaffected. This closes the cobol catastrophic-hang case proven 2026-07-01: tree_sitter_language_pack's bundled parser exposes no progress_callback and can hang unkillable in-process, so out-of-process isolation is the only mechanism that hard-bounds it."
    test: test_pool_timeout_kills_and_respawns_only_that_slot
  - id: HR40
    spec: "CPU budget is two-tier and kernel-enforced, not merely cooperative (2026-07-01). Idle/steady-state stays < 1% of one core — a live-measured automated gate over the daemon's own cgroup-v2 cpu.stat usage_usec delta (daemon/cpu_budget.py, exposed via /healthz and /api/metrics). Active work is bounded <= 1 core by CPUQuota=100% on the daemon's systemd unit (cgroup-v2 cpu.max), with CPUAccounting=yes set explicitly since CPUQuota alone does not imply it (systemd issue #9647); the ceiling covers bounded_parse.py's spawn-context worker pool too, since those workers are children of the daemon's own service cgroup (RSE_BOUNDED_PARSE_WORKERS defaults to 1 under this quota). cpu.stat's nr_throttled/throttled_usec climbing under sustained load is the canonical proof the cap is physically enforced, not merely that usage happened to stay low; a hermetic systemd-run --user --scope self-test proves the cpu controller is genuinely delegated to the --user manager on this host, independent of the daemon's own unit. Requires the cpu controller delegated to the --user systemd manager (verified via delegate.conf); the live gate fails loudly with a remediation hint if the quota reads back as infinity."
    test: test_cb2_daemon_cpu_quota_enforced

# ── L4: Code patterns & generation rules ─────────────────────────────────────
L4_patterns:
  - "upsert_community: always pass summary=None (never empty string) to avoid churn"
  - "project_graph_db: content-addressed path (slug + sha256[:16])"
  - "expand_federation returns [root] + entry.federation — canonical logical-repo primitive"
  - "deepseek_extract: prefix-cached stable system prompt; dynamic user prompt only"
  - "graph.db communities: level=1 only (L2/L3 deleted WS-B 2026-06-26)"
  - "iter_files: federation_mode=True prunes symlink dirs pointing outside root"
  - "on_change drift gate: compute _code_source_fingerprint(path) after index step (code-only, HR38); skip enrich if sig == _last_enriched_sig[path]; commit sig only after successful _enrich_project"
  - "all tree-sitter parses route through index/bounded_parse.py's spawn-context worker pool (HR39) — never a direct get_parser(...).parse() call"
  - "watcher: one watchfiles.watch() generator in a single 'rse-watcher' thread covers all roots; _filter reuses is_ignored_path; watch(new_path) while running sets a restart Event and blocks on a restart-ack Event (bounded) so the caller only returns once the new root is actually armed"
  - "code-semantic resolution ladder (HR15-19, 3 tiers): tree-sitter extraction -> valueflow FQN-join -> resolve_rerank GPU cross-encoder -> bpre._llm_link_resolve (SEA, capped/cached/batched, accounted under bpre_link.*); each tier sees only the prior tier's unresolved residue"
  - "any new DeepSeek call site in kb/ or graph/ must feed _accumulate_llm_tokens(usage, category) so llm_token_stats() stays a complete accounting (HR23) — no direct deepseek_extract call bypasses it"
  - "discovery decision order (index/discover.py _should_drop): RSE exclude (drop) > RSE include (force-keep) > default hidden-dir/IGNORED_DIRS policy (drop) > .gitignore (drop, supplementary) > keep — RSE config is always authoritative over .gitignore"
  - "CPU quota proof (HR40): daemon/cpu_budget.py resolves the caller's own cgroup-v2 dir via /proc/self/cgroup (unified hierarchy only); cpu.max's first field is the cores ceiling, cpu.stat's nr_throttled/throttled_usec climbing under load is the enforcement proof — both must be read from inside the daemon process (its own HTTP route handlers), never from a foreign PID"
