name: CI

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:  # manual "Run workflow" — requires write access (owner-only)
  schedule:
    - cron: "0 2 * * *"  # nightly at 02:00 UTC
  # NOTE: no `pull_request` trigger. This is a PUBLIC repo whose GPU jobs run on a
  # self-hosted runner (the maintainer's device); a fork PR must never be able to
  # trigger CI. Every trigger above requires write access or is the owner's own cron.

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Code quality (ruff + compile check)
  # ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/rag_search src/tests

      - name: Compile check
        run: python -m compileall -q src/rag_search

  # ──────────────────────────────────────────────
  # Job 2: Test discovery — confirm all live tests
  # are collected without import errors
  # ──────────────────────────────────────────────
  collect:
    name: Test Collection
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e 'src[dev]' --quiet

      - name: Collect live tests (no services needed)
        run: |
          python -m pytest src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            --collect-only -q 2>&1 | tail -5

      - name: Confirm zero non-live tests remain
        run: |
          count=$(python -m pytest src/tests/ -m "not live" --collect-only -q 2>&1 | grep "selected" | grep -oP '\d+' | head -1 || echo 0)
          echo "Non-live test count: ${count:-0}"
          test "${count:-0}" -eq 0 || (echo "ERROR: found non-live tests that can pass without real services" && exit 1)

  # ──────────────────────────────────────────────
  # Fast live tests: enforcement, config, search,
  # KB health — run on every push to main.
  # Completes in <5 minutes on GPU runner.
  #
  # NOTE: requires a self-hosted GitHub Actions runner with:
  #   - NVIDIA CUDA GPU (CPU fallback is forbidden by design)
  #   - a pre-provisioned .venv at the repo root
  #   - a running rag-search daemon at 127.0.0.1:8765
  # Forks without a GPU runner will see this job queued indefinitely.
  # Run the live suite locally instead: .venv/bin/pytest -m "live and not slow"
  # ──────────────────────────────────────────────
  live-fast:
    name: Live Tests Fast (GPU runner)
    runs-on: self-hosted
    needs: quality
    # Self-hosted runner = the maintainer's device. Hard-gate to the owner account:
    # this job may only ever execute when fairyhunter13 is the triggering actor.
    if: github.actor == 'fairyhunter13' && github.ref == 'refs/heads/main' && github.repository == 'fairyhunter13/rag-search-engine'

    steps:
      - uses: actions/checkout@v4

      # The runner checks out a fresh clone (no .venv). Provision a persistent
      # venv from the CHECKED-OUT source (editable install -> tests the checkout,
      # not any dev tree). Path is env-driven ($HOME) — device-neutral, and lives
      # outside the workspace so checkout's git-clean never wipes it. First run
      # installs GPU deps + caches; later runs are fast (pip sees them satisfied).
      - name: Provision GPU test venv
        run: |
          VENV="$HOME/.cache/rse-ci-venv"
          test -x "$VENV/bin/python" || python3 -m venv "$VENV"
          "$VENV/bin/pip" install -e 'src[dev]' --quiet
          echo "RSE_CI_VENV=$VENV" >> "$GITHUB_ENV"

      - name: Verify daemon is running
        run: curl -sf http://localhost:8765/api/projects > /dev/null

      - name: Run fast live tests (all non-slow)
        run: |
          "$RSE_CI_VENV/bin/pytest" \
            src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            -m "live and not slow" \
            -q --tb=short --timeout=120

  # ──────────────────────────────────────────────
  # Slow live tests: full E2E, chat quality, browser
  # Run on schedule (nightly) — these take 15-30 min.
  # Same self-hosted GPU runner requirement as live-fast.
  # ──────────────────────────────────────────────
  live-slow:
    name: Live Tests Slow (GPU runner, scheduled)
    runs-on: self-hosted
    needs: quality
    # Same owner-account hard-gate as live-fast (self-hosted = maintainer's device).
    if: github.actor == 'fairyhunter13' && (github.event_name == 'schedule' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[slow-ci]')))

    steps:
      - uses: actions/checkout@v4

      # Same env-driven persistent venv as live-fast (see that job for rationale).
      - name: Provision GPU test venv
        run: |
          VENV="$HOME/.cache/rse-ci-venv"
          test -x "$VENV/bin/python" || python3 -m venv "$VENV"
          "$VENV/bin/pip" install -e 'src[dev]' --quiet
          echo "RSE_CI_VENV=$VENV" >> "$GITHUB_ENV"

      - name: Verify daemon is running
        run: curl -sf http://localhost:8765/api/projects > /dev/null

      - name: Run full live suite (all tests including slow)
        run: |
          "$RSE_CI_VENV/bin/pytest" \
            src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            -m "live" \
            -q --tb=short --timeout=600

      - name: Run browser tests
        run: |
          "$RSE_CI_VENV/bin/pytest" src/tests/live/test_browser.py \
            --browser chromium --tb=short --timeout=300
