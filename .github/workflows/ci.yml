name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Code quality (ruff + compile check)
  # ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/opencode_search src/tests

      - name: Compile check
        run: python -m compileall -q src/opencode_search

  # ──────────────────────────────────────────────
  # Job 2: Test discovery — confirm all live tests
  # are collected without import errors
  # ──────────────────────────────────────────────
  collect:
    name: Test Collection
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e 'src[dev]' --quiet

      - name: Collect live tests (no services needed)
        run: |
          python -m pytest src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            --collect-only -q 2>&1 | tail -5

      - name: Confirm zero non-live tests remain
        run: |
          count=$(python -m pytest src/tests/ -m "not live" --collect-only -q 2>&1 | grep "selected" | grep -oP '\d+' | head -1 || echo 0)
          echo "Non-live test count: ${count:-0}"
          test "${count:-0}" -eq 0 || (echo "ERROR: found non-live tests that can pass without real services" && exit 1)

  # ──────────────────────────────────────────────
  # Live tests run on self-hosted GPU runner only
  # (requires daemon :8765, Ollama :11434, RTX GPU)
  # ──────────────────────────────────────────────
  live:
    name: Live Tests (GPU runner)
    runs-on: self-hosted
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Verify daemon is running
        run: curl -sf http://localhost:8765/api/projects > /dev/null

      - name: Run live test suite
        run: |
          .venv/bin/pytest src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            --ignore=src/tests/live/test_quality.py \
            -q --tb=short

      - name: Run quality gate tests
        run: |
          .venv/bin/pytest src/tests/live/test_quality.py \
            -q --tb=short

      - name: Run browser tests
        run: |
          .venv/bin/pytest src/tests/live/test_browser.py \
            --browser chromium --tb=short
