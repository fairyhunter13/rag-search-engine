name: CI

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:  # manual "Run workflow" — requires write access (owner-only)
  schedule:
    - cron: "0 2 * * *"  # nightly at 02:00 UTC
  # NOTE: no `pull_request` trigger. This is a PUBLIC repo whose GPU jobs run on a
  # self-hosted runner (the maintainer's device); a fork PR must never be able to
  # trigger CI. Every trigger above requires write access or is the owner's own cron.

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Code quality (ruff + compile check)
  # ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # vendor/docgen provides ose_docgen (test_docgen_all_projects)

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/rag_search src/tests

      - name: Compile check
        run: python -m compileall -q src/rag_search

  # ──────────────────────────────────────────────
  # Job 2: Test discovery — confirm all live tests
  # are collected without import errors
  # ──────────────────────────────────────────────
  collect:
    name: Test Collection
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # vendor/docgen provides ose_docgen (test_docgen_all_projects)

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (base + collection tools)
        # `dev` is a PEP 735 dependency-group, NOT an extra — `src[dev]` silently
        # installs nothing (base only) and pytest goes missing. Install the base
        # package (GPU wheels install fine CPU-side; only runtime needs CUDA) plus
        # the two tools collection needs. Collection is GPU-free (onnxruntime is
        # deferred to a fixture), so this runs on the GitHub-hosted runner.
        run: |
          pip install -e src --quiet
          pip install pytest pytest-asyncio --quiet

      - name: Collect live tests (no services needed)
        # No `| tail` — a bare pipe masks pytest's exit code, so an import/collection
        # error (exit 2) would look green. Let the non-zero exit fail the step.
        run: |
          python -m pytest src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            --collect-only -q

      - name: Confirm zero non-live tests remain
        # Every real test lives under src/tests/live/ and must carry the `live`
        # marker (nothing may pass without real services). Scope to that dir — the
        # whole src/tests/ tree also holds fixture sample-projects (test DATA, e.g.
        # fixtures/.../test_ledger.py) that must not be collected as suite tests.
        # pytest exit codes: 5 = no tests collected (the state we WANT — zero
        # non-live), 0 = some collected (policy violation), other = real error.
        # The old `| grep | ... || echo 0` masked all three into a trivial pass.
        run: |
          set -uo pipefail
          rc=0
          python -m pytest src/tests/live/ --ignore=src/tests/live/test_browser.py \
            -m "not live" --collect-only -q || rc=$?
          case "$rc" in
            5) echo "OK: zero non-live tests remain" ;;
            0) echo "ERROR: found non-live tests runnable without real services"; exit 1 ;;
            *) echo "ERROR: pytest collection failed (exit $rc)"; exit "$rc" ;;
          esac

  # ──────────────────────────────────────────────
  # Fast live tests: enforcement, config, search,
  # KB health — run on every push to main.
  # Completes in <5 minutes on GPU runner.
  #
  # Runs IN the maintainer's registered + indexed working tree ($RSE_DEV_REPO,
  # set in the runner's .env — device path kept out of this public file). The
  # suite assumes "this repo" is a live, indexed project (e.g.
  # test_pipeline_all_stages_rse_repo) and uses that tree's .venv as the canonical
  # GPU env, so there is deliberately NO fresh checkout here.
  # NOTE: requires a self-hosted runner with a CUDA GPU (no CPU fallback) and a
  # running rag-search daemon at 127.0.0.1:8765. Forks are skipped by the `if`.
  # Run the live suite locally instead: .venv/bin/pytest -m "live and not slow"
  # ──────────────────────────────────────────────
  live-fast:
    name: Live Tests Fast (GPU runner)
    runs-on: self-hosted
    needs: quality
    timeout-minutes: 20  # kernel-independent hang guard (no pytest-timeout plugin needed)
    # Self-hosted runner = the maintainer's device. Hard-gate to the owner account:
    # this job may only ever execute when fairyhunter13 is the triggering actor.
    if: github.actor == 'fairyhunter13' && github.ref == 'refs/heads/main' && github.repository == 'fairyhunter13/rag-search-engine'

    steps:
      - name: Verify daemon is running
        run: curl -sf http://localhost:8765/api/projects > /dev/null

      - name: Run fast live tests (all non-slow)
        # In the indexed dev tree ($RSE_DEV_REPO) with its .venv. Flags mirror the
        # documented CLAUDE.md fast smoke command; job-level timeout-minutes bounds
        # runaway runs (pytest-timeout is not a project dep).
        run: |
          : "${RSE_DEV_REPO:?set RSE_DEV_REPO in the runner .env to the indexed repo path}"
          cd "$RSE_DEV_REPO"
          .venv/bin/pytest \
            src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            -m "live and not slow" \
            -x --strict-markers --strict-config -ra -q --tb=short

  # ──────────────────────────────────────────────
  # Slow live tests: full E2E, chat quality, browser
  # Run on schedule (nightly) — these take 15-30 min.
  # Same self-hosted GPU runner requirement as live-fast.
  # ──────────────────────────────────────────────
  live-slow:
    name: Live Tests Slow (GPU runner, scheduled)
    runs-on: self-hosted
    needs: quality
    timeout-minutes: 60  # full suite + browser; bounds runaway/hung runs
    # Same owner-account hard-gate as live-fast (self-hosted = maintainer's device).
    if: github.actor == 'fairyhunter13' && (github.event_name == 'schedule' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[slow-ci]')))

    steps:
      - name: Verify daemon is running
        run: curl -sf http://localhost:8765/api/projects > /dev/null

      - name: Run full live suite (all tests including slow)
        # Same indexed-dev-tree model as live-fast; job-level timeout-minutes bounds the run.
        run: |
          : "${RSE_DEV_REPO:?set RSE_DEV_REPO in the runner .env to the indexed repo path}"
          cd "$RSE_DEV_REPO"
          .venv/bin/pytest \
            src/tests/live/ \
            --ignore=src/tests/live/test_browser.py \
            -m "live" \
            -x --strict-markers --strict-config -ra -q --tb=short

      - name: Run browser tests
        run: |
          : "${RSE_DEV_REPO:?set RSE_DEV_REPO in the runner .env to the indexed repo path}"
          cd "$RSE_DEV_REPO"
          .venv/bin/pytest src/tests/live/test_browser.py \
            --browser chromium --tb=short
