[project]
name = "opencode-search"
version = "0.2.0"
description = "GPU-accelerated local semantic code search engine"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "OpenCode Team" }]

dependencies = [
    # GPU-accelerated embeddings and reranking
    "fastembed-gpu>=0.4.0",
    "onnxruntime-gpu[cuda,cudnn]>=1.24.0",

    # Chunking: code (tree-sitter), semantic, token
    "chonkie[code,semantic]>=1.5.0",
    # Chonkie's embedding registry imports openai even for local-only paths
    "openai>=1.0.0",

    # Chunking: structure-aware text splitters
    "langchain-text-splitters>=0.3.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",

    # Parsing
    "pyyaml>=6.0.0",

    # Vector database
    "lancedb>=0.20.0",
    "pyarrow>=17.0.0",

    # File watching
    "watchdog>=3.0.0",

    # Gitignore matching
    "pathspec>=0.12.0",

    # Result and model caches
    "cachetools>=5.3.0",

    # VRAM watchdog
    "pynvml>=11.0.0",

    # MCP stdio server
    "mcp>=1.0.0",

    # CLI
    "typer>=0.9.0",

    # Process utilities
    "psutil>=5.9.0",
]

[project.optional-dependencies]
gpu = [
    # GPU matrix ops (L2 normalization)
    "cupy-cuda12x>=13.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[project.scripts]
opencode-search = "opencode_search.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencode_search"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501",   # line too long — typer help strings are unavoidably long
    "B008",   # typer.Option/Argument in default args is the intended typer API
    "RUF002", # × (MULTIPLICATION SIGN) in docstrings is intentional math notation
]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["src/tests", "tests"]
markers = [
    "unit: fast logic-only test",
    "integration: test exercises real runtime integrations",
    "runtime_deps: test requires optional runtime packages",
    "gpu: test requires a real CUDA GPU",
    "perf: performance benchmark tests",
    "embedder: tests that require the Python embedder service",
    "indexer: tests that require the Rust indexer service",
    "slow: tests that run for more than 30 seconds",
]
